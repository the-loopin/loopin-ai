services:
  loopin-ai:
    build: .
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /models/huggingface
      LOOPIN_EMBEDDINGS_ENABLED: ${LOOPIN_EMBEDDINGS_ENABLED:-true}
      LOOPIN_RERANKER_ENABLED: ${LOOPIN_RERANKER_ENABLED:-false}
      LOOPIN_EMBEDDINGS_ACTIVE: ${LOOPIN_EMBEDDINGS_ACTIVE:-multilingual_e5_small}
      LOOPIN_RERANKER_ACTIVE: ${LOOPIN_RERANKER_ACTIVE:-bge_reranker_v2_m3}
      EMBEDDING_MAX_CONCURRENCY: ${EMBEDDING_MAX_CONCURRENCY:-2}
      RERANKER_MAX_CONCURRENCY: ${RERANKER_MAX_CONCURRENCY:-1}
      INFERENCE_QUEUE_CAPACITY: ${INFERENCE_QUEUE_CAPACITY:-20}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-2}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-2}
      TOKENIZERS_PARALLELISM: ${TOKENIZERS_PARALLELISM:-false}
    volumes:
      - loopin-ai-model-cache:/models/huggingface

volumes:
  loopin-ai-model-cache:
