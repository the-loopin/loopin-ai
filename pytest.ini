[pytest]
pythonpath = .
markers =
    real_model: tests that load the configured Hugging Face embedding model (set RUN_REAL_MODEL_TESTS=true)
    reranker: tests that load the configured Hugging Face reranker (set RUN_REAL_MODEL_TESTS=true and RUN_RERANKER_TESTS=true)
    benchmark: long-running benchmark checks; never selected by the default suite
