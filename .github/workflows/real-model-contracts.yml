name: Real model contracts and benchmark

on:
  pull_request:
    paths:
      - "app/**"
      - "benchmarks/**"
      - "config/models.yaml"
      - "requirements.txt"
      - "tests/contract/**"
      - "tests/fixtures/**"
      - ".github/workflows/real-model-contracts.yml"
  workflow_dispatch:
    inputs:
      run_reranker:
        description: Run optional reranker contracts and comparison benchmark
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 3 * * 1"

jobs:
  real-model-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Deliberately a CI-only token, never a deployment secret.
      LOOPIN_SERVICE_TOKEN: ci-real-model-contract-test-token
      RUN_REAL_MODEL_TESTS: "true"
      RUN_RERANKER_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_reranker && 'true' || 'false' }}
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"
      TOKENIZERS_PARALLELISM: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-${{ hashFiles('config/models.yaml', 'requirements.txt') }}
          restore-keys: ${{ runner.os }}-huggingface-
      - run: pip install -r requirements.txt
      - name: Scheduled/manual embedding contracts
        run: pytest -q -m real_model
      - name: Vector-only benchmark
        run: python benchmarks/run_recommendation_benchmark.py
      - name: Optional reranker contracts and benchmark
        if: env.RUN_RERANKER_TESTS == 'true'
        run: |
          pytest -q -m "real_model or reranker"
          python benchmarks/run_recommendation_benchmark.py --include-reranker
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommendation-benchmark-${{ github.run_id }}
          path: |
            benchmark-results/*.json
            docs/benchmarks/latest.md
          if-no-files-found: warn
